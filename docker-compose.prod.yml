services:
  app:
    build:
      context: .
      target: app
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      DOCKER_RUN_MIGRATIONS: "true"
      DOCKER_OPTIMIZE: "true"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - app-storage:/var/www/html/storage
    healthcheck:
      test: ["CMD-SHELL", "php artisan about > /dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  web:
    build:
      context: .
      target: web
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - app-storage:/var/www/html/storage:ro
    restart: unless-stopped

  worker:
    build:
      context: .
      target: app
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      DOCKER_RUN_MIGRATIONS: "false"
      DOCKER_OPTIMIZE: "true"
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - app-storage:/var/www/html/storage
    stop_grace_period: 1m
    restart: unless-stopped

  scheduler:
    build:
      context: .
      target: app
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      DOCKER_RUN_MIGRATIONS: "false"
      DOCKER_OPTIMIZE: "true"
    command: php artisan schedule:work
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - app-storage:/var/www/html/storage
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-mauricare}
      MYSQL_USER: ${DB_USERNAME:-mauricare}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  app-storage:
  mysql-data:
